# Example Secret for optional mTLS allowlists. Copy to 11-secret.yaml, fill in,
# and keep it out of git. Leave values empty to disable a given allowlist.
#
# These are NOT credentials for the service itself — they pin which client
# certificate subjects/fingerprints the app accepts (defence-in-depth on top of
# the Ingress mTLS verification).
apiVersion: v1
kind: Secret
metadata:
  name: data-collector-secret
  namespace: data-collector
  labels:
    app.kubernetes.io/name: data-collector-webservice
type: Opaque
stringData:
  # Comma-separated substrings matched against the forwarded client subject DN.
  ALLOWED_CLIENT_CERT_SUBJECTS: ""
  # Comma-separated exact client certificate fingerprints.
  ALLOWED_CLIENT_CERT_FINGERPRINTS: ""
