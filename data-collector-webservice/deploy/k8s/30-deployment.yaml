apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-collector-webservice
  namespace: data-collector
  labels:
    app.kubernetes.io/name: data-collector-webservice
spec:
  # 6 replicas → 2 per worker across the 3 worker nodes. Tune with the HPA.
  replicas: 6
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: data-collector-webservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-collector-webservice
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        # NFS volumes are written by uid/gid 10001; fsGroup lets the pod write
        # when the export is not root-squashed. If your NFS uses root_squash,
        # export it as no_root_squash or pre-chown the dirs to 10001:10001.
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      # Spread replicas across the 3 worker nodes for load distribution and HA.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: data-collector-webservice
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: data-collector-webservice
      containers:
        - name: app
          image: ghcr.io/duosis-developer-team/data-collector-webservice:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: data-collector-config
            - secretRef:
                name: data-collector-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: staging
              mountPath: /nfs/airflow-staging
            - name: audit
              mountPath: /var/lib/data-collector
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: staging
          persistentVolumeClaim:
            claimName: data-collector-staging
        - name: audit
          persistentVolumeClaim:
            claimName: data-collector-audit
        - name: tmp
          emptyDir: {}
