# Nginx reverse-proxy configuration for the data collector web service.
#
# - Terminates HTTPS on :443 with TLS 1.2+.
# - Verifies client certificates against a configured CA bundle (mTLS).
# - Forwards mTLS metadata to the FastAPI app via X-SSL-* headers.
# - Limits request body size and proxy timeouts.
#
# This file is the reference for the same-host (systemd / docker-compose) layout.
# In Kubernetes, mTLS termination is done by the Ingress (see deploy/k8s/ingress.yaml).
# For docker-compose, change the proxy_pass target from 127.0.0.1:8000 to app:8000.

upstream collector_app {
    server 127.0.0.1:8000;
}

server {
    listen 443 ssl http2;
    server_name data-collector.example.com;

    # ----- Server TLS material -----
    ssl_certificate     /etc/data-collector/certs/server.crt;
    ssl_certificate_key /etc/data-collector/certs/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ----- Client certificate verification (mTLS) -----
    ssl_client_certificate /etc/data-collector/certs/client_ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # ----- Request limits / timeouts -----
    client_max_body_size 10m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # ----- Logging -----
    access_log /var/log/nginx/data-collector.access.log;
    error_log  /var/log/nginx/data-collector.error.log warn;

    # Health endpoint may be exposed without mTLS for liveness probes if desired.
    # location = /health {
    #     allow 127.0.0.1;
    #     deny all;
    #     proxy_pass http://collector_app;
    # }

    location / {
        proxy_pass http://collector_app;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # mTLS metadata for the FastAPI app to enforce.
        proxy_set_header X-SSL-Client-Verify       $ssl_client_verify;
        proxy_set_header X-SSL-Client-Subject      $ssl_client_s_dn;
        proxy_set_header X-SSL-Client-Issuer       $ssl_client_i_dn;
        proxy_set_header X-SSL-Client-Fingerprint  $ssl_client_fingerprint;
    }
}

# Redirect plain HTTP to HTTPS (defensive; OBM should never hit :80 directly).
server {
    listen 80;
    server_name data-collector.example.com;
    return 301 https://$host$request_uri;
}
